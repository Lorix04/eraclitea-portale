name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: formazione_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma@5 generate

      - name: Run migrations
        run: npx prisma@5 migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/formazione_test

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/formazione_test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: hashFiles('coverage/lcov.info') != ''
        with:
          files: ./coverage/lcov.info

  e2e:
    needs: test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: portale
          POSTGRES_PASSWORD: portale_test
          POSTGRES_DB: portale_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://portale:portale_test@localhost:5432/portale_test
      NEXTAUTH_SECRET: test-secret-key-for-e2e
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_KEY: test-encryption-key-32-chars-long!
      NODE_ENV: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma@5 generate

      - name: Run migrations
        run: npx prisma@5 migrate deploy

      - name: Seed database
        run: npx prisma@5 db seed

      - name: Build application
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npx playwright test --project=chromium

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    # Disabilitato: il deploy avviene via Docker su VPS, non Vercel
    if: false
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: echo "Deploy via Docker su VPS — vedere AGENTS.md per istruzioni"
