name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: formazione_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma@5 generate

      - name: Run migrations
        run: npx prisma@5 migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/formazione_test

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/formazione_test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: hashFiles('coverage/lcov.info') != ''
        with:
          files: ./coverage/lcov.info

  e2e:
    # Disabilitato: serve seed database + env configurati per i test e2e
    if: false
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  deploy:
    # Disabilitato: il deploy avviene via Docker su VPS, non Vercel
    if: false
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: echo "Deploy via Docker su VPS — vedere AGENTS.md per istruzioni"
